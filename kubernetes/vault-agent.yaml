# ====================================================
# Project QuantumLedger - HashiCorp Vault Agent Sidecar Integration
# ====================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  labels:
    app: vault-agent
data:
  vault-agent-config.hcl: |
    exit_after_auth = false
    pid_file = "/home/vault/pid"

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "cbdc-api-role"
        }
      }

      sink "file" {
        config = {
          path = "/home/vault/.vault-token"
        }
      }
    }

    # Dynamic Database Secrets Template Injection
    template {
      destination = "/vault/secrets/db-creds.json"
      contents = <<EOH
      {
        {{- with secret "database/creds/cbdc-app-role" -}}
        "username": "{{ .Data.username }}",
        "password": "{{ .Data.password }}",
        "lease_id": "{{ .LeaseID }}"
        {{- end -}}
      }
      EOH
    }

    # TLS Certificates Template Injection for Secure gRPC
    template {
      destination = "/vault/secrets/tls.crt"
      contents = <<EOH
      {{- with secret "pki_int/issue/cbdc-domain" "common_name=ledger.cbdc.internal" -}}
      {{ .Data.certificate }}
      {{- end -}}
      EOH
    }

    template {
      destination = "/vault/secrets/tls.key"
      contents = <<EOH
      {{- with secret "pki_int/issue/cbdc-domain" "common_name=ledger.cbdc.internal" -}}
      {{ .Data.private_key }}
      {{- end -}}
      EOH
    }
---
